services:
  webmail-ui:
    image: rjyspl/webmail-ui:latest
    container_name: webmail-ui
    # Load environment variables from the .env file
    env_file:
      - .env
    environment:
      - TZ=Asia/Kolkata
    ports:
      - '127.0.0.1:3000:3000'
    restart: always
