name: ✨ Feature Request
description: Suggest a new feature or enhancement for Yukthi Webmail
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea to improve Yukthi Webmail!
        💬 Want to discuss your idea with the community first? Join our [Discord server](https://discord.gg/29zTxvque).

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: I'm always frustrated when...
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
      value: |


        ---
        💬 Discuss this issue on our [Discord](https://discord.gg/29zTxvque)
    validations:
      required: false
