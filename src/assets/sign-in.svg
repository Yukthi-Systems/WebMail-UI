<svg width="1200" height="800" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pinkGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC0CB; stop-opacity:1" /> <stop offset="100%" style="stop-color:#FF69B4; stop-opacity:1" /> </linearGradient>
    <linearGradient id="pinkGradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1; stop-opacity:0.8" /> <stop offset="100%" style="stop-color:#DB7093; stop-opacity:0.9" /> </linearGradient>
    <radialGradient id="pinkRadialGradient" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#FFF0F5; stop-opacity:0.7" /> <stop offset="60%" style="stop-color:#FFD1DC; stop-opacity:0.5" /> <stop offset="100%" style="stop-color:#FF69B4; stop-opacity:0.3" /> </radialGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#FFF5F7" />

  <path d="M -100,300
           Q 150,100 400,350
           T 900,400
           L 900,700
           L -100,700 Z"
        fill="url(#pinkGradient1)" opacity="0.6"/>

  <path d="M -100,150
           Q 200,400 500,200
           T 900,250
           L 900,-50
           L -100,-50 Z"
        fill="url(#pinkGradient2)" opacity="0.7"/>

  <ellipse cx="400" cy="300" rx="350" ry="200" fill="url(#pinkRadialGradient)" opacity="0.8" filter="url(#softBlur)" />

</svg>
